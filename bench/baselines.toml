[qemu.sched_pick_next]
# Scheduler pick_next_task measured in ISOLATION (not folded into a
# context switch): one steady-state round-robin rotation = pick_next
# (bitmap trailing_zeros + VecDeque pop_front) + enqueue (push_back +
# bit-set), at a run-queue depth of 1024 tasks.  The depth-scaling sweep
# (bench_pick_next_scaling) proves this stays flat from depth 1 to 1024,
# empirically confirming the O(1) design.  Target 100ns is a comfortable
# ceiling for a bitmap scan plus two VecDeque ends.  On real hardware the
# op is single-digit ns; under QEMU/TCG the run() harness pays a
# CPUID-serialized rdtsc per iteration (~900-950ns floor, same as
# hpet_read), which dominates, so the measured min_ns is a TCG artifact.
# The real O(1) guard is the depth-1->1024 ratio (observed ~0.98x, flat);
# target_ns sits above the TCG floor so a genuine O(n) blow-up still trips.
# Observed under QEMU/TCG: min_ns ~952 at depth 1024.
target_ns = 1500

