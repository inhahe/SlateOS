# Build configuration for file explorer.
[build]
target = "../../toolchain/x86_64-ouros.json"

[unstable]
build-std = ["core", "alloc", "std", "panic_abort"]
json-target-spec = true

[target.x86_64-ouros]
linker = "rust-lld"
rustflags = [
    "-C", "link-arg=-L../../toolchain/sysroot/lib",
    "-C", "link-arg=-lstubs",
    "-C", "link-arg=--allow-multiple-definition",
]
