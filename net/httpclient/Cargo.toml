[package]
name = "httpclient"
version = "0.1.0"
edition = "2024"
description = "OurOS HTTP Client — native HTTP/1.1 client library"

[workspace]

[lib]
name = "httpclient"
path = "src/lib.rs"

[profile.release]
opt-level = "s"
lto = false
panic = "abort"
strip = "symbols"

[profile.dev]
panic = "abort"
