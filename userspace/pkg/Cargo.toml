[package]
name = "pkg"
version = "0.1.0"
edition = "2024"
description = "OurOS package manager — content-addressed store with atomic generations"

# Standalone crate — not part of the kernel workspace.
[workspace]

[dependencies]
httpclient = { path = "../../net/httpclient" }

[profile.release]
opt-level = "s"
lto = false
panic = "abort"
strip = "symbols"

[profile.dev]
panic = "abort"
