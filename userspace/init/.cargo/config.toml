# Build configuration for userspace init binary.
# Target: bare-metal x86_64, but running in ring 3 (user mode).
#
# This MUST override the workspace-level .cargo/config.toml which sets
# code-model=kernel (upper 2 GiB).  Userspace code runs at lower
# addresses and needs PIC for position independence.

[build]
target = "x86_64-unknown-none"

[target.x86_64-unknown-none]
linker = "rust-lld"
# Static relocation + large code model: uses 64-bit absolute addresses
# throughout, avoiding the GOT entirely.  PIC mode generates GOT entries
# that require R_X86_64_RELATIVE relocations at load time, but our
# linker script discards .rela.* and the kernel doesn't process them.
# Large model is slightly less efficient but correct for any address.
rustflags = [
    "-C", "link-arg=-Tlinker.ld",
    "-C", "relocation-model=static",
    "-C", "code-model=large",
]
