[package]
name = "coreutils"
version = "0.1.0"
edition = "2024"
description = "Basic userspace utilities (cat, echo, ls, mkdir, head, wc, cp, rm, mv, touch, tail, sort, grep, ln, pwd, env, sleep, true, false, uname, basename, dirname, tee, rmdir, seq, yes, which, date, uniq, cut, tr)"

# Standalone crate — not part of the kernel workspace.
[workspace]

# Each binary is a separate file in src/bin/.
# Build all:   cargo +nightly build -Zbuild-std=... --release
# Build one:   cargo +nightly build -Zbuild-std=... --release --bin cat

[profile.release]
opt-level = "s"       # Optimize for size — embedded in kernel image.
lto = false
panic = "abort"
strip = "symbols"

[profile.dev]
panic = "abort"

[[bin]]
name = "mv"
path = "src/bin/mv.rs"

[[bin]]
name = "touch"
path = "src/bin/touch.rs"

[[bin]]
name = "tail"
path = "src/bin/tail.rs"

[[bin]]
name = "sort"
path = "src/bin/sort.rs"

[[bin]]
name = "grep"
path = "src/bin/grep.rs"

[[bin]]
name = "ln"
path = "src/bin/ln.rs"

[[bin]]
name = "pwd"
path = "src/bin/pwd.rs"

[[bin]]
name = "env"
path = "src/bin/env.rs"

[[bin]]
name = "sleep"
path = "src/bin/sleep.rs"

[[bin]]
name = "true"
path = "src/bin/true.rs"

[[bin]]
name = "false"
path = "src/bin/false.rs"

[[bin]]
name = "uname"
path = "src/bin/uname.rs"

[[bin]]
name = "basename"
path = "src/bin/basename.rs"

[[bin]]
name = "dirname"
path = "src/bin/dirname.rs"

[[bin]]
name = "tee"
path = "src/bin/tee.rs"

[[bin]]
name = "rmdir"
path = "src/bin/rmdir.rs"

[[bin]]
name = "seq"
path = "src/bin/seq.rs"

[[bin]]
name = "yes"
path = "src/bin/yes.rs"

[[bin]]
name = "which"
path = "src/bin/which.rs"

[[bin]]
name = "date"
path = "src/bin/date.rs"

[[bin]]
name = "uniq"
path = "src/bin/uniq.rs"

[[bin]]
name = "cut"
path = "src/bin/cut.rs"

[[bin]]
name = "tr"
path = "src/bin/tr.rs"
