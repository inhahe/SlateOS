[package]
name = "coreutils"
version = "0.1.0"
edition = "2024"
description = "Basic userspace utilities (46 total: cat, echo, ls, mkdir, head, wc, cp, rm, mv, touch, tail, sort, grep, ln, pwd, env, sleep, true, false, uname, basename, dirname, tee, rmdir, seq, yes, which, date, uniq, cut, tr, chmod, chown, id, whoami, hostname, readlink, realpath, stat, printf, test, kill, dd, df, du, xargs)"

# Standalone crate — not part of the kernel workspace.
[workspace]

# Each binary is a separate file in src/bin/.
# Build all:   cargo +nightly build -Zbuild-std=... --release
# Build one:   cargo +nightly build -Zbuild-std=... --release --bin cat

[profile.release]
opt-level = "s"       # Optimize for size — embedded in kernel image.
lto = false
panic = "abort"
strip = "symbols"

[profile.dev]
panic = "abort"

[[bin]]
name = "mv"
path = "src/bin/mv.rs"

[[bin]]
name = "touch"
path = "src/bin/touch.rs"

[[bin]]
name = "tail"
path = "src/bin/tail.rs"

[[bin]]
name = "sort"
path = "src/bin/sort.rs"

