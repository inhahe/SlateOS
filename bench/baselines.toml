notes       = """
This is the most frequent checksum operation — runs on every TCP \
segment sent/received.  Linux uses hardware offload on real NICs; \
our software path must be fast for QEMU/virtio where offload may \
not be available."""

[net_tcp_checksum_v6_1460b]
description = "TCP checksum with IPv6 pseudo-header, MSS-sized segment"
target_ns   = 2200
target_cycles = 8100
source      = "Estimate: slightly more than v4 (40-byte vs 12-byte pseudo-header)"
notes       = """
IPv6 pseudo-header adds 28 extra bytes (14 more 16-bit additions) \
compared to IPv4.  Should be ~5% slower than v4 for MSS-sized segments \
where the data dominates."""

