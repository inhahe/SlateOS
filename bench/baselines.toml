# -------------------------------------------------------------------------
# HTTP server baselines (target performance)
# -------------------------------------------------------------------------

[http_parse_request]
description = "HTTP/1.1 request parsing (~200 bytes)"
target_ns   = 15000
source      = "Dominated by 3 String allocations + UTF-8 validation"
notes       = """
Runs once per HTTP request.  Not a hot loop but affects request \
latency.  The main cost is heap allocation (method, path, version \
strings).  Could be optimized with a zero-copy parser but the \
current approach is correct and clear."""

[http_mime_type]
description = "MIME type lookup from file extension"
target_ns   = 500
source      = "Pure match statement, no allocation"
notes       = "Per-lookup cost.  Runs once per served file."

[http_percent_decode]
description = "URI percent-decode with encoded characters"
target_ns   = 20000
source      = "Vec allocation + byte scan + hex parsing"
notes       = """
Runs once per request on the URI path.  Cost scales with the \
number of percent-encoded sequences.  Most paths have zero \
encodings (fast path: just copy bytes)."""

[http_etag_4KiB]
description = "ETag computation (FNV-1a hash + hex format) for 4 KiB body"
target_ns   = 5000
source      = "FNV-1a over 4096 bytes + format! hex string + String allocation"
notes       = """
Runs once per HTTP response (both plain and gzip paths).  FNV-1a \
is byte-at-a-time — not SIMD-accelerated — but the 64-bit multiply \
chain is efficient on x86_64.  4 KiB = 4096 iterations of XOR+mul."""

[http_build_response_1KiB]
description = "Full HTTP response construction (headers + 1 KiB body, no compression)"
target_ns   = 20000
source      = "ETag hash + format!() header (~300 bytes) + Vec::extend body"
notes       = """
The uncompressed response path: etag_for_body() → format!() for \
8 header fields → Vec<u8> concatenation.  Dominated by the format! \
macro (multiple integer-to-string conversions) and String allocation. \
Runs on every non-compressed response."""

[http_build_response_gzip_1KiB]
description = "Full gzip-compressed HTTP response (headers + 1 KiB body)"
target_ns   = 250000
source      = "gzip compress (~200us) + ETag hash + format!() header + Vec::extend"
notes       = """
The compressed response path: gzip() → etag_for_body() → format!() \
for 10 header fields → Vec concatenation.  Gzip dominates (~90% of \
total cost).  This is the hot path for text/html responses when \
clients send Accept-Encoding: gzip."""

