[package]
name = "crond"
version = "0.1.0"
edition = "2024"
description = "OurOS cron daemon — time-based task scheduler with crontab management"

# Standalone crate — not part of the kernel workspace.
[workspace]

[dependencies]

[profile.release]
opt-level = "s"
lto = false
panic = "abort"
strip = "symbols"

[profile.dev]
panic = "abort"
