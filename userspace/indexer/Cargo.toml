[package]
name = "indexer"
version = "0.1.0"
edition = "2024"
description = "OurOS background file indexer — configurable paths and extensions, off by default"

# Standalone crate — not part of the kernel workspace.
[workspace]

[dependencies]

[profile.release]
opt-level = "s"
lto = false
panic = "abort"
strip = "symbols"

[profile.dev]
panic = "abort"
