[package]
name = "guiremote"
version = "0.1.0"
edition = "2024"
description = "OurOS remote-desktop protocol — serialises guitk RenderCommand streams"

# Standalone crate — not part of the kernel workspace.
[workspace]

[dependencies]
guitk = { path = "../toolkit" }

[profile.release]
opt-level = "s"
lto = false
panic = "abort"
strip = "symbols"

[profile.dev]
panic = "abort"
