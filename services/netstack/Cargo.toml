[package]
name = "netstack"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "netstack"
path = "src/main.rs"

[dependencies]
# Shared no_std protocol parsers/builders (Ethernet/ARP/IPv4/ICMP + RFC 1071
# checksum). netproto inherits this crate's x86_64-unknown-none target when
# built as a dependency, so its own .cargo config (host tests) doesn't apply.
netproto = { path = "../../netproto" }
# Shared kernel<->daemon control-message schema (opcodes, status codes,
# request/reply encode/decode). Single source of truth with the kernel side.
netipc = { path = "../../netipc" }
