[workspace]
resolver = "2"
members = [
    "kernel",
]
# Userspace binaries are excluded because they need different rustflags
# (no code-model=kernel, no kernel linker script).  They are built
# separately via `cargo build` in their own directories.
exclude = [
    "userspace/init",
    "userspace/hello",
    "userspace/ticker",
    # --- shell (osb2) ---
    "userspace/shell",
    # --- coreutils (osb2) ---
    "userspace/coreutils",
    "posix",
    # --- toolchain (osb2) ---
    "toolchain/stubs",
    # --- apps (osb2) ---
    "apps/hexeditor",
    "apps/contacts",
    "apps/remotedesktop",
    "apps/defrag",
    "apps/benchmark",
    "apps/screenrecorder",
    "apps/paint",
    "apps/markdowneditor",
    "apps/spreadsheet",
    "apps/videoplayer",
    "apps/calendar",
    "apps/ircclient",
    "apps/rssreader",
    "apps/torrent",
    "apps/email",
    "apps/filesearch",
    "apps/notes",
    "apps/slides",
    "apps/photomanager",
    "apps/diagram",
    "apps/mediaconvert",
    "apps/passwordgen",
    "apps/dbviewer",
    "apps/filediff",
    "apps/automator",
    "apps/sysmonitor",
    "apps/regextester",
    "apps/jsonviewer",
    "apps/qrcode",
    "apps/snippets",
    "apps/logviewer",
    # --- osb2 batch 4 ---
    "apps/tmux",
    "apps/reminders",
    "apps/undelete",
    "apps/renamer",
    # --- osb2 batch 5 ---
    "apps/charmap",
    "apps/camera",
    "apps/netscan",
    "apps/pomodoro",
    "apps/magnifier",
    "apps/podcast",
    "apps/diskimager",
    "apps/dictionary",
    "apps/whiteboard",
    "apps/kanban",
    "apps/radio",
    # --- osb2 batch 6 ---
    "apps/worldclock",
    "apps/minesweeper",
    "apps/flashcards",
    "apps/habits",
    "apps/mindmap",
    "apps/finance",
    # --- osb2 batch 7 ---
    "apps/chess",
    "apps/sudoku",
    "apps/tetris",
    "apps/snake",
    "apps/game2048",
    "apps/typingtutor",
    # --- osb2 batch 8 ---
    "apps/checkers",
    "apps/reversi",
    "apps/ebook",
    "apps/stopwatch",
    "apps/compass",
    "apps/metronome",
    # --- osb2 batch 9 ---
    "apps/connect4",
    "apps/hangman",
    "apps/simon",
    "apps/crossword",
    "apps/wordsearch",
    "apps/pipes",
    # --- osb2 batch 10 ---
    "apps/breakout",
    "apps/sokoban",
    "apps/gomoku",
    "apps/life",
    "apps/maze",
    "apps/battleship",
    "apps/tictactoe",
    "apps/mandelbrot",
]

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
indexing_slicing = "warn"
arithmetic_side_effects = "warn"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
