[package]
name = "ticker"
version = "0.1.0"
edition = "2024"

[profile.release]
opt-level = "s"       # Optimize for size — embedded in kernel image.
lto = false           # LTO conflicts with code-model=large (core uses small).
panic = "abort"
strip = "symbols"     # Strip debug symbols from the final binary.

[profile.dev]
panic = "abort"
