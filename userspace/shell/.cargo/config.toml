# Build configuration for userspace shell binary.
#
# Uses our custom target spec (x86_64-ouros.json) which pretends to be
# linux-musl so Rust std's unix backend works, but links against our
# POSIX library (provided as libc.a in the sysroot).
#
# Build with:
#   cargo +nightly build -Zbuild-std=core,alloc,std,panic_abort --release

[build]
target = "../../toolchain/x86_64-ouros.json"

[unstable]
build-std = ["core", "alloc", "std", "panic_abort"]

[target.x86_64-ouros]
linker = "rust-lld"
rustflags = [
    "-C", "link-arg=-Tlinker.ld",
    "-C", "link-arg=-L../../toolchain/sysroot/lib",
    "-C", "link-arg=-lstubs",
    "-C", "link-arg=--allow-multiple-definition",
]
