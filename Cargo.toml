[workspace]
resolver = "2"
members = [
    "kernel",
]
# Userspace binaries are excluded because they need different rustflags
# (no code-model=kernel, no kernel linker script).  They are built
# separately via `cargo build` in their own directories.
exclude = [
    "userspace/init",
    "userspace/hello",
    "userspace/ticker",
    # --- shell (osb2) ---
    "userspace/shell",
    # --- coreutils (osb2) ---
    "userspace/coreutils",
    "posix",
    # --- toolchain (osb2) ---
    "toolchain/stubs",
]

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
indexing_slicing = "warn"
arithmetic_side_effects = "warn"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
