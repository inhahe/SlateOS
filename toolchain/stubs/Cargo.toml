[package]
name = "slateos-stubs"
version = "0.1.0"
edition = "2024"
description = "Stub symbols needed by Rust std that our POSIX layer doesn't provide"

[lib]
crate-type = ["staticlib"]
# slateos-stubs provides its own `panic_handler` for the bare-metal
# `x86_64-slateos` target.  Host-side `cargo test` cannot link it because
# `std` already supplies a `panic_impl`.  Tests for the stub symbols
# must run under the bare-metal target via the kernel boot-test harness.
test = false
