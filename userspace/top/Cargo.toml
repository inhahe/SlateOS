[package]
name = "top"
version = "0.1.0"
edition = "2024"
description = "OurOS interactive process monitor — real-time CPU, memory, and process info"

# Standalone crate — not part of the kernel workspace.
[workspace]

[dependencies]

[profile.release]
opt-level = "s"
lto = false
panic = "abort"
strip = "symbols"

[profile.dev]
panic = "abort"
